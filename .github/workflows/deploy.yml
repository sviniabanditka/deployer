name: Build & Deploy

on:
  push:
    branches: [main, master]

env:
  REGISTRY: registry.sviniabanditka.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ${{ env.REGISTRY }}/deployer-api:${{ github.sha }},${{ env.REGISTRY }}/deployer-api:latest

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: ${{ env.REGISTRY }}/deployer-web:${{ github.sha }},${{ env.REGISTRY }}/deployer-web:latest

      - name: Build and push Worker
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.worker
          push: true
          tags: ${{ env.REGISTRY }}/deployer-worker:${{ github.sha }},${{ env.REGISTRY }}/deployer-worker:latest

      - name: Deploy to k3s
        uses: appleboy/ssh-action@v1
        with:
          host: ssh.sviniabanditka.com
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            kubectl -n deployer set image deployment/deployer-api deployer-api=${{ env.REGISTRY }}/deployer-api:${{ github.sha }}
            kubectl -n deployer set image deployment/deployer-web deployer-web=${{ env.REGISTRY }}/deployer-web:${{ github.sha }}
            kubectl -n deployer set image deployment/deployer-worker deployer-worker=${{ env.REGISTRY }}/deployer-worker:${{ github.sha }}
            kubectl -n deployer rollout status deployment/deployer-api --timeout=120s
            kubectl -n deployer rollout status deployment/deployer-web --timeout=120s
            kubectl -n deployer rollout status deployment/deployer-worker --timeout=120s
