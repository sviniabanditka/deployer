apiVersion: v1
kind: Service
metadata:
  name: deployer-api
  namespace: deployer
  labels:
    app: deployer-api
    app.kubernetes.io/part-of: deployer
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 8080
  selector:
    app: deployer-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployer-api
  namespace: deployer
  labels:
    app: deployer-api
    app.kubernetes.io/part-of: deployer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deployer-api
  template:
    metadata:
      labels:
        app: deployer-api
        app.kubernetes.io/part-of: deployer
    spec:
      containers:
        - name: deployer-api
          image: deployer-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: deployer-config
            - secretRef:
                name: deployer-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: deployer-api
  namespace: deployer
  labels:
    app: deployer-api
    app.kubernetes.io/part-of: deployer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: deployer-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
