apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: deployer

commonLabels:
  app.kubernetes.io/part-of: deployer

resources:
  - namespace.yml
  - configmap.yml
  - secrets.yml
  - postgres.yml
  - redis.yml
  - registry.yml
  - api.yml
  - worker.yml
  - web.yml
  - ingress.yml
  - monitoring.yml
  - cert-manager.yml
