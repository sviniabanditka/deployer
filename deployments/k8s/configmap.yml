apiVersion: v1
kind: ConfigMap
metadata:
  name: deployer-config
  namespace: deployer
  labels:
    app.kubernetes.io/part-of: deployer
data:
  SERVER_PORT: "8080"
  REGISTRY_URL: "registry:5000"
  APP_DOMAIN: "apps.deployer.dev"
  DOCKER_NETWORK: "deployer"
  WEBHOOK_BASE_URL: "https://api.deployer.dev"
  BILLING_PORTAL_RETURN_URL: "https://app.deployer.dev/billing"
  BACKUP_DIR: "/data/backups"
  NIXPACKS_PATH: "nixpacks"
  UPLOAD_DIR: "/data/uploads"
