apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deployer-ingress
  namespace: deployer
  labels:
    app.kubernetes.io/part-of: deployer
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.deployer.dev"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Origin, Content-Type, Accept, Authorization"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.deployer.dev
        - app.deployer.dev
      secretName: deployer-tls
    - hosts:
        - "*.apps.deployer.dev"
      secretName: deployer-wildcard-tls
  rules:
    - host: api.deployer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deployer-api
                port:
                  number: 3000
    - host: app.deployer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deployer-web
                port:
                  number: 80
    - host: "*.apps.deployer.dev"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deployer-api
                port:
                  number: 3000
