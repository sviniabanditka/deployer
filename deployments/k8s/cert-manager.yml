apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app.kubernetes.io/part-of: deployer
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@deployer.dev
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/part-of: deployer
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@deployer.dev
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
      - dns01:
          cloudDNS: {}
        selector:
          dnsNames:
            - "*.apps.deployer.dev"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: deployer-tls
  namespace: deployer
  labels:
    app.kubernetes.io/part-of: deployer
spec:
  secretName: deployer-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - deployer.dev
    - api.deployer.dev
    - app.deployer.dev
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: deployer-wildcard-tls
  namespace: deployer
  labels:
    app.kubernetes.io/part-of: deployer
spec:
  secretName: deployer-wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "*.apps.deployer.dev"
