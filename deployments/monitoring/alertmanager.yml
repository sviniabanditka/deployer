global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: 'critical-email'
      match:
        severity: critical
    - receiver: 'slack-warnings'
      match:
        severity: warning

receivers:
  - name: 'default'
    email_configs:
      - to: 'admin@example.com'
        from: 'alertmanager@deployer.dev'
        smarthost: 'smtp.example.com:587'
        auth_username: 'alertmanager@deployer.dev'
        auth_password: '<placeholder>'

  - name: 'critical-email'
    email_configs:
      - to: 'oncall@example.com'
        from: 'alertmanager@deployer.dev'
        smarthost: 'smtp.example.com:587'
        auth_username: 'alertmanager@deployer.dev'
        auth_password: '<placeholder>'

  - name: 'slack-warnings'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/<placeholder>'
        channel: '#deployer-alerts'
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
