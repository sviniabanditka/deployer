groups:
  - name: deployer-alerts
    rules:
      - alert: AppDown
        expr: up{job="deployer-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Deployer API is down"
          description: "The deployer-api target has been unreachable for more than 1 minute."

      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage has been above 80% for more than 5 minutes on {{ $labels.instance }}."

      - alert: HighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage has been above 90% for more than 5 minutes on {{ $labels.instance }}."

      - alert: DiskSpaceRunningOut
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space running out"
          description: "Less than 10% disk space remaining on {{ $labels.instance }}."

      - alert: APIHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="deployer-api"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API high latency"
          description: "95th percentile latency is above 2 seconds for the deployer API."

      - alert: APIHighErrorRate
        expr: sum(rate(http_requests_total{job="deployer-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{job="deployer-api"}[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API high error rate"
          description: "More than 5% of API requests are returning 5xx errors."

      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL exporter is down"
          description: "The postgres-exporter target has been unreachable for more than 1 minute."

      - alert: BuildQueueBacklog
        expr: deployer_pending_builds > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Build queue backlog"
          description: "There are more than 10 pending builds in the queue for over 5 minutes."
